# Boozt intake rules, versioned to Boozt Information Guide (Beauty) v1.3.
# Enums extracted from docs/BooztGuide_v1.3.pdf; enums fail closed everywhere.
guide_version: "1.3"
name_max_chars: 60
size_pattern: '^\d+(\.\d+)? (ml|g|pcs)$|^One Size$'

# Guide section 1.1.19. Matching is case-insensitive; emit uses these display forms.
categories:
  - Hair care
  - Hair brushes
  - Accessories
  - Beauty accessories
  - Sets
  - Shaving products
  - Deodorants
  - Makeup
  - Foundation
  - Beauty electronics
  - Perfumes
  - Sex/intimacy
  - Self Tan
  - Beard care
  - Home & Spa
  - Oral care
  - Body Care
  - Perfume set
  - Skin care
  - Nail care tools
  - Makeup tools
  - Nail polish

# Guide color filter codes. 1017 is used for skincare; 1018 only for
# foundations and concealers.
color_codes:
  1001: Cream
  1002: Beige
  1003: Pink
  1004: Blue
  1005: Green
  1006: Yellow
  1007: Orange
  1008: Purple
  1009: Red
  1010: Brown
  1011: Grey
  1012: Black
  1013: White
  1014: Silver
  1015: Gold
  1016: Multi-Colored
  1017: Clear
  1018: Natural
  1019: Navy
  1020: Khaki green
  1021: Coral
  1022: Burgundy

# Categorization keyword rules (build kit 6.7), keyed on product name, never
# the ODM subcategory. foundation_family is checked FIRST: it is the single
# biggest error surface (guide files foundations/concealers/tinted moisturizers
# under "Foundation", not "Makeup").
category_rules:
  # hair first so "hair brush" beats makeup_tools "brush"; unambiguous hair
  # terms only — bare mask/oil/spray/treatment stay out to preserve fail-closed
  # cross-brand (a Maria Nila "Masque" resolves via the site name carrying
  # "hair"/line context, verified at gate B)
  hair_brushes:
    category: Hair brushes
    keywords:
      - hair brush
      - detangling brush
      - paddle brush
      - detangler
  hair_care:
    category: Hair care
    keywords:
      - shampoo
      - conditioner
      - conditioning
      - hair mask
      - hair masque
      - hair oil
      - hair treatment
      - hair serum
      - hair spray
      - hairspray
      - heat spray
      - leave-in
      - leave in
      - dry shampoo
      - scalp
      - colour refresh
      - color refresh
      - masque
      - hair mist
      - styling
      - mousse
      - texture spray
      - hair veil
  foundation_family:
    category: Foundation
    keywords:
      - foundation
      - concealer
      - bb cream
      - cc cream
      - tinted moisturizer
  makeup:
    category: Makeup
    keywords:
      - blush
      - bronzer
      - bronzing
      - powder
      - primer
      - mascara
      - eyeshadow
      - eyeliner
      - eye liner
      - brow
      - eyebrow
      - setting mist # LR Setting Mist -> Makeup, confirmed Felina 2026-07-03
      - lip
      - lipstick
      - highlighter
      - luminizer
  makeup_tools:
    category: Makeup tools
    keywords:
      - brush
      - applicator
      - eyelash curler
  sets:
    category: Sets
    keywords:
      - set
      - kit
      - advent calendar
  nail_polish:
    category: Nail polish
    keywords:
      - nail polish
      - nail lacquer
      - polish remover
  skin_care:
    category: Skin care
    keywords:
      - serum
      - moisturiser
      - moisturizer
      - cleanser
      - toner
      - face cream
  body_care:
    category: Body Care
    keywords:
      - body lotion
      - body cream
      - hand cream
      - hand balm

# Boozt Color code rules (build kit 6.7).
color_code_rules:
  # Rule 1: skincare and colorless products -> 1017 Clear.
  clear_categories:
    - Skin care
    - Body Care
    - Hair care
    - Deodorants
  # Rule 2: foundation family -> 1018 Natural (guide rule; confirmed).
  foundation_family_code: 1018
  foundation_family_pending: false
  foundation_family_note: confirmed Felina 2026-07-03
  # Rule 3b lives per brand: shade names collide between brands, so the
  # curated lexicon is keyed (brand, shade) in brands.yaml.
  #
  # Multi-shade products (palettes, quads, shade sets) carry several colors
  # under one shade name — the lexicon never decides them. Confirmed Felina
  # 2026-07-03 (session + her manual sheet): palettes take 1016 Multi-Colored.
  multi_shade_default: 1016
  multi_shade_note: confirmed Felina 2026-07-03 (manual sheet codes both quads 1016)
  multi_shade_markers:
    - quad
    - palette
    - trio
    - duo

# No-color standard (open question 3 CLOSED, confirmed Felina 2026-07-03):
# shadeless rows ship Color Name "Clear" + code 1017. CAVEAT: legacy sheets
# used CLEAR / NO COLOR / NO SHADE — the Boozt portal may still show the
# legacy wording on previously uploaded items.
no_color_standard:
  color_name: Clear
  color_code: 1017
  note: confirmed Felina 2026-07-03; portal may show legacy wording (CLEAR/NO
    COLOR/NO SHADE) on items uploaded before this standard

# Observed no-color conventions across finished sheets. Mixed usage is a
# lint flag.
no_color_aliases:
  - CLEAR
  - NO COLOR
  - NO COLOUR
  - NO SHADE

# Dangerous goods triggers (build kit 6.8): rows in these categories always
# stay red until a human confirms against the SDS — the flammable="No"
# default must never apply to them.
dg_trigger_categories:
  - Perfumes
  - Perfume set
  - Nail polish
  - Deodorants
  - Home & Spa

# Flammable (Y/N) is an INCI property, not a category one — a hairspray and a
# conditioner are both "Hair care" but only the aerosol is flammable. An aerosol
# propellant or volatile solvent in the ingredient list => flammable Yes,
# overriding the category default. Matched despaced/dehyphenated at the
# ingredient-token level, so localised spellings ("Dimethylether",
# "alcoholdenat.") still hit. Plain "Alcohol"/"Ethanol" are INTENTIONALLY
# excluded: fatty alcohols (Cetearyl/Cetyl Alcohol) are not flammable and a minor
# ethanol in a leave-in is not classified flammable. Validated against Felina's
# OR26BZNX0001 corrections (106/109; the misses were bad captured INCI, not the
# rule). Felina's "anything with Butane => flammable" is a subset of this.
flammable_inci_markers:
  exact:
    - butane
    - isobutane
    - propane
    - isopentane
    - pentane
    - dimethylether
    - hydrofluorocarbon
    - hydrofluorocarbon152a
    - hydrofluoroolefin
  prefix:
    - alcoholdenat
    - sdalcohol

# Dangerous goods: packing group vs flash point (guide table; Phase 1 module,
# validation function tested now). Temperatures in Celsius.
pg_flash_point:
  "II": {max_exclusive: 23}
  "III": {min_inclusive: 23, max_inclusive: 61}
