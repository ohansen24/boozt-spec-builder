olaplex:
  boozt_code: OX
  display_name: Olaplex
  domains: [olaplex.com]
  # name-normalization rules from the golden run (2026-07-03), ready before
  # any Olaplex order: site publishes "Nº.5 … MOISTURIZE & MEND …®" style
  name_format:
    title_case: true
    replacements:
      - { from: "Nº.", to: "No. " }
      - { from: "N°.", to: "No. " }
      - { from: "®", to: "" }
      - { from: "™", to: "" }
  # probe 2026-07-03: Shopify; products.json barcodes suppressed AND polluted
  # with unpublished multi-market handles — resolution goes sitemap handles ->
  # {handle}.js, where published products DO carry barcodes
  adapter: shopify
  shopify:
    domain: olaplex.com
  style_prefix: LAP # style numbers deviate from {prefix}{ean12}; pattern unconfirmed
  gender_default: U
  country_iso: from_odm

