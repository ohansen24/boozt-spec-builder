# Per-brand configuration (build kit section 11). style_prefix doubles as
# foreign-prefix knowledge for the style-number lint (regression case 1).
nars:
  boozt_code: QN
  display_name: NARS
  adapter: nars_sfcc
  domains: [narscosmetics.eu]
  gtin_form: "13"
  # SFRA storefront (live capture 2026-07-02); no browser-side OCAPI client_id
  controller_base: https://www.narscosmetics.eu/on/demandware.store/Sites-nars_eu-Site/default/
  pdp_base: https://www.narscosmetics.eu/en/
  style_prefix: null # OPEN QUESTION 1: NARS prefix unconfirmed -> column stays MANUAL
  gender_default: F # per her finished work; ODM's blanket "unisex" is unreliable
  country_iso: from_odm
  # Curated brand product-type knowledge (the brand's own taxonomy), used by
  # the categorizer where a generic keyword would fail closed. "The Multiple"
  # is NARS's multi-use color stick.
  product_name_categories:
    multiple: Makeup
  # Site styling -> sheet form (confirmed Felina 2026-07-03):
  # "ORGASM – 777" -> "Orgasm"; verbatim site string stays in provenance.
  # Formatting never downgrades a cell — identity follows the matrix.
  shade_format:
    # drop standalone numeric shade codes at either edge ("ORGASM – 777",
    # "888 DOLCE VITA", "500 - FARAWAY" — EU site styling varies per line);
    # purely numeric shades are kept and belong in shade_format_overrides
    strip_shade_codes: true
    title_case: true # confirmed Felina 2026-07-03 ("Dolce Vita" style)
  # Product-level exceptions (confirmed Felina 2026-07-03): matched casefold
  # against the site product name; number_template rebuilds the shade from
  # its first digit run.
  shade_format_overrides:
    "laguna bronzing powder":
      number_template: "Laguna {number:02d}" # shades are literally "Laguna 01"…
  name_format:
    title_case: true # site publishes ALL CAPS ("POWDER BLUSH" -> "Powder Blush")
  style_number_policy:
    by_design_blank: true
    note: "prefix issued by Boozt, Felina fills on receipt (confirmed Felina 2026-07-03)"
  expiry_on_pack_default:
    value: "No"
    note: "NARS brand default; confirmed Felina 2026-07-03"
  # Curated shade lexicon (kit 6.7 rule 3b), keyed to THIS brand — shade
  # names collide across brands. Exact match on the normalized shade unless
  # match: prefix. Grown per run from confirmed shades.
  shade_lexicon:
    - shade: orgasm
      code: 1003
    - shade: deep rose
      code: 1003
    - shade: laguna
      code: 1010
      match: prefix
    - shade: clear
      code: 1017
  us_fallback:
    controller_base: https://www.narscosmetics.com/on/demandware.store/Sites-nars_us-Site/en_US/
    note: US site fallback (same brand family, different region) — ships yellow
  # Last rung: Wayback snapshots of the brand's own PDPs, GTIN-anchored,
  # yellow-only, snapshot date recorded in provenance.
  archive_fallback:
    domain: narscosmetics.eu

