# Global colour-word -> Boozt anchor map (Stage 1, Oli 2026-07-06).
#
# PURPOSE: raise the color_code auto-rate for path-3 products (everything that
# is not skincare/colourless 1017, foundation/concealer 1018, or a multi-shade
# palette 1016). Reads plain colour/undertone WORDS out of the normalized
# color_name and proposes the matching anchor.
#
# This is GLOBAL and versioned — deliberately DISTINCT from a per-brand
# shade_lexicon (which holds Felina-confirmed shade->code entries). It never
# overrides the 1017/1018/1016 rules, never overrides a confirmed lexicon hit,
# and its output is always a PROPOSAL: value filled, YELLOW, noted "proposed
# from shade name — please confirm or correct". Proposals never write to a
# brand lexicon; only Felina's confirmed/corrected values do (ingest-review).
#
# MULTI-WORD RULE (documented, deliberately conservative): extract every token
# that is a colour word below; ignore modifier/undertone words. Propose ONLY if
# all matched colour words resolve to exactly ONE anchor. Zero colour words, or
# two+ distinct anchors (e.g. "Golden Brick Red" -> Gold+Red, "Nude Pink" ->
# Beige+Pink) => NO proposal, stays red for Felina. Precision over coverage;
# Stage 2 (swatch hex) is the second signal for the rest.
#
# NEVER proposes 1016 Multi-Colored, 1017 Clear, 1018 Natural (meta-codes).

version: 1

# undertone / finish / intensity words — ignored (not anchors)
modifiers:
  - warm
  - cool
  - cold
  - light
  - medium
  - deep
  - dark
  - neutral
  - soft
  - rich
  - intense
  - bright
  - pale
  - fair
  - muted
  - matte
  - satin
  - sheer
  - super
  - supercharged
  - baby
  - true

