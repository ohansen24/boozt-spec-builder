# Global colour-word -> Boozt anchor map (Stage 1, Oli 2026-07-06).
#
# PURPOSE: raise the color_code auto-rate for path-3 products (everything that
# is not skincare/colourless 1017, foundation/concealer 1018, or a multi-shade
# palette 1016). Reads plain colour/undertone WORDS out of the normalized
# color_name and proposes the matching anchor.
#
# This is GLOBAL and versioned — deliberately DISTINCT from a per-brand
# shade_lexicon (which holds Felina-confirmed shade->code entries). It never
# overrides the 1017/1018/1016 rules, never overrides a confirmed lexicon hit,
# and its output is always a PROPOSAL: value filled, YELLOW, noted "proposed
# from shade name — please confirm or correct". Proposals never write to a
# brand lexicon; only Felina's confirmed/corrected values do (ingest-review).
#
# MULTI-WORD RULE (documented, deliberately conservative): extract every token
# that is a colour word below; ignore modifier/undertone words. Propose ONLY if
# all matched colour words resolve to exactly ONE anchor. Zero colour words, or
# two+ distinct anchors (e.g. "Golden Brick Red" -> Gold+Red, "Nude Pink" ->
# Beige+Pink) => NO proposal, stays red for Felina. Precision over coverage;
# Stage 2 (swatch hex) is the second signal for the rest.
#
# NEVER proposes 1016 Multi-Colored, 1017 Clear, 1018 Natural (meta-codes).

version: 3

# Stage 2: representative sRGB hex per CHROMATIC anchor, for the swatch-hex ->
# nearest-anchor proposer (perceptual CIELAB ΔE). Deliberately excludes the
# meta-codes 1016 Multi / 1017 Clear / 1018 Natural — hex never proposes those.
# Used as the SECOND signal: agrees-with-word -> stronger proposal; disagrees
# -> no proposal (both shown, red); hex-only -> lower-confidence proposal.
anchors_hex:
  1001: FFFDD0  # Cream
  1002: F5F5DC  # Beige
  1003: FFC0CB  # Pink
  1004: 1F4FFF  # Blue
  1005: 2E8B57  # Green
  1006: FFEB3B  # Yellow
  1007: FF8C00  # Orange
  1008: 8E4585  # Purple
  1009: E0242B  # Red
  1010: 8B5A2B  # Brown
  1011: 808080  # Grey
  1012: 1A1A1A  # Black
  1013: FFFFFF  # White
  1014: C0C0C0  # Silver
  1015: D4AF37  # Gold
  1019: 1B2A4A  # Navy
  1020: 7C7B4E  # Khaki green
  1021: FF7F50  # Coral
  1022: 7B1E3B  # Burgundy

# Stage 2 signal weighting (Oli 2026-07-06): a swatch whose CIELAB chroma
# (C* = sqrt(a^2 + b^2)) is below this is a low-chroma NEUTRAL (grey/beige/
# cream/silver territory) — a WEAK signal that must not veto an unambiguous
# chromatic word. On a word/hex disagreement where the hex is low-chroma and
# the word is chromatic, emit a WORD-ONLY proposal (never "two signals agree").
# Strong-vs-strong (both chromatic) disagreements stay red.
low_chroma_threshold: 20

version_note: v3 adds low_chroma_threshold for Stage-2 signal weighting

# undertone / finish / intensity words — ignored (not anchors)
modifiers:
  - warm
  - cool
  - cold
  - light
  - medium
  - deep
  - dark
  - neutral
  - soft
  - rich
  - intense
  - bright
  - pale
  - fair
  - muted
  - matte
  - satin
  - sheer
  - super
  - supercharged
  - baby
  - true

